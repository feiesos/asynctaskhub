server:
  port: 8080

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:asynctaskhub}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# ── RocketMQ 消费者重试配置 ──
# maxReconsumeTimes=3 是演示用途的调低配置，方便快速触发死信队列。
# 生产环境建议保持 Broker 默认值 16，或至少 >= 5。
# 实际配置在 @RocketMQMessageListener(maxReconsumeTimes = 3) 上设置。
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:9876}
  producer:
    group: async-task-producer
